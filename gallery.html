<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Omega Cleaning Services</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
        }

        header {
            background: #003366;
            color: white;
            padding: 15px 0;
            text-align: center;
        }

        nav {
            background: #0055a5;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover {
            color: #ffd700;
        }

        .hero-banner {
            width: 100%;
            overflow: hidden;
        }

        .hero-banner img {
            width: 100%;
            display: block;
        }

        .gallery-section {
            padding: 50px 20px;
            text-align: center;
        }

        .gallery-section h1 {
            color: #003366;
            margin-bottom: 15px;
        }

        .gallery-section p {
            margin-bottom: 30px;
            color: #555;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: auto;
        }

        .gallery-item {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            transition: transform 0.3s;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        .gallery-caption {
            padding: 15px;
            font-weight: bold;
            color: #003366;
        }

        footer {
            background: #003366;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        @media(max-width:768px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Omega Cleaning Services</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>

    <section class="hero-banner">
        <img src="banner.png" alt="Omega Cleaning Services Banner">
    </section>

    <section class="gallery-section">
        <h1>Our Gallery</h1>
        <p>Take a look at some of our work and promotional materials.</p>

        <div class="gallery-grid">

            <div class="gallery-item">
                <img src="banner.png" alt="Company Banner">
                <div class="gallery-caption">Company Banner</div>
            </div>

            <div class="gallery-item">
                <img src="poster.png" alt="Cleaning Services Poster">
                <div class="gallery-caption">Cleaning Services Poster</div>
            </div>

            <div class="gallery-item">
                <img src="poster1.png" alt="Promotional Poster">
                <div class="gallery-caption">Promotional Poster</div>
            </div>

        </div>
    </section>

    <footer>
        <p>&copy; 2026 Omega Cleaning Services. All Rights Reserved.</p>
    </footer>

</body>
</html>
