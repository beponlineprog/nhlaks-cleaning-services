<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Nhlaks Cleaning Services</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
    }

    header {
      background: #28a745;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      text-align: center;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #218838;
    }

    #loading {
      display: none;
      text-align: center;
      margin-top: 10px;
      color: #555;
    }

    .info {
      margin-bottom: 20px;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
  <h1>Nhlaks Cleaning Services</h1>
  <p>Contact Us</p>
</header>

<div class="container">

  <!-- Your old contact info section -->
  <div class="info">
    <p><strong>Phone:</strong> 078 557 2248</p>
    <p><strong>Email:</strong> norikhotso@gmail.com</p>
    <p><strong>Address:</strong> 35446 Ndumo Street, Etwatwa Ext.34, Daveyton</p>
  </div>

  <h2>Send us a Message</h2>

  <form id="contactForm" action="https://formspree.io/f/mwvnzwbk" method="POST">

    <input type="text" name="name" placeholder="Your Name" required>

    <input type="email" name="email" placeholder="Your Email" required>

    <textarea name="message" rows="6" placeholder="Your Message" required></textarea>

    <!-- Redirect to your thank you page -->
    <input type="hidden" name="_next" value="https://beponlineprog.github.io/nhlaks-cleaning-services/thanks.html">

    <button type="submit" id="submitBtn">Send Message</button>

    <div id="loading">Sending message... please wait ⏳</div>
  </form>

</div>

<script>
  const form = document.getElementById("contactForm");
  const loading = document.getElementById("loading");
  const button = document.getElementById("submitBtn");

  form.addEventListener("submit", function () {
    button.disabled = true;
    button.innerText = "Sending...";
    loading.style.display = "block";
  });
</script>

</body>
</html>
